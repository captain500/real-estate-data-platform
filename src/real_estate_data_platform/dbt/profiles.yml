real_estate_data_platform:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'etl_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'etl_pass') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'etl_db') }}"
      schema: gold
      threads: 4
