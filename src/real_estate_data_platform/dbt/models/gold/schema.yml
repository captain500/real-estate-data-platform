version: 2

models:
  - name: fct_rental_listings
    description: >
      SCD2 fact table with the full history of rental listings.
      Each row is a version of a listing, tracked by row_hash changes.
    columns:
      - name: scd_id
        description: Surrogate key generated by dbt snapshot (dbt_scd_id).
        tests:
          - not_null
          - unique
      - name: listing_id
        tests:
          - not_null
      - name: website
        tests:
          - not_null
      - name: neighbourhood_sk
        description: FK to dim_neighbourhoods.
        tests:
          - relationships:
              arguments:
                to: ref('dim_neighbourhoods')
                field: neighbourhood_sk
              where: "neighbourhood_sk IS NOT NULL"
      - name: row_hash
        tests:
          - not_null
      - name: scraped_at
        tests:
          - not_null
      - name: valid_from
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - listing_id
              - website
              - valid_from

  - name: dim_neighbourhoods
    description: >
      Neighbourhood dimension with walkability scores.
      Insert-only — existing rows are never overwritten.
    columns:
      - name: neighbourhood_sk
        description: Surrogate key md5(neighbourhood || '~' || city).
        tests:
          - not_null
          - unique
      - name: neighbourhood
        tests:
          - not_null
      - name: city
        tests:
          - not_null
      - name: loaded_at
        tests:
          - not_null
