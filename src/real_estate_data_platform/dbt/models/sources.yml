version: 2

sources:
  - name: silver
    schema: silver
    tables:
      - name: rental_listings
        description: >
          Current-state rental listings loaded by the bronze-to-silver ETL.
          Each row represents the latest scrape of a unique (listing_id, website) pair.
      - name: neighbourhoods
        description: >
          Unique (neighbourhood, city) pairs with walkability scores
          extracted during the bronze-to-silver ETL.
